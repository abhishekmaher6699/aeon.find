services:
  - type: web
    name: aeon
    runtime: docker
    plan: starter
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DEBUG
        value: False
      - key: ARTIFACTS_DIR
        value: /data/artifacts
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    disk:
      name: artifacts
      mountPath: /data/artifacts
      sizeGB: 5

  - type: cron
    name: aeon-weekly-refresh
    runtime: docker
    schedule: "0 2 * * 1"
    dockerCommand: sh -c "pip install -r requirements-ml.txt && python manage.py run_scraper && python manage.py build_model"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ARTIFACTS_DIR
        value: /data/artifacts
    disk:
      name: artifacts             # same disk as the web service
      mountPath: /data/artifacts
      sizeGB: 5